name: Deploy To Droplet VPS

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euxo pipefail

            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
            BRANCH="${{ github.ref_name }}"

            if [ -z "$DEPLOY_PATH" ]; then
              echo "VPS_DEPLOY_PATH secret is required"
              exit 1
            fi

            echo "[1/7] Move to deploy path"
            cd "$DEPLOY_PATH"

            echo "[2/7] Sync branch $BRANCH"
            git fetch --all --prune
            git reset --hard "origin/$BRANCH"

            echo "[3/7] Install PHP dependencies"
            export COMPOSER_NO_INTERACTION=1
            export COMPOSER_ALLOW_SUPERUSER=1
            composer install --no-interaction --no-ansi --prefer-dist --no-dev --optimize-autoloader --no-progress -vvv

            echo "[4/7] Run migrations"
            php artisan migrate --force

            echo "[5/7] Refresh caches"
            php artisan optimize:clear
            php artisan optimize

            echo "[6/7] Ensure storage symlink"
            php artisan storage:link || true

            echo "[7/7] Restart queue workers"
            php artisan queue:restart || true

            echo "Deploy finished successfully"
